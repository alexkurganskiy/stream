services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stream
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./storage:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/vod || true;
      mc anonymous set none local/vod;
      exit 0;
      "

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://stream:stream@db:5432/stream
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vod
      STREAM_T0: "2024-01-01T00:00:00Z"
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
